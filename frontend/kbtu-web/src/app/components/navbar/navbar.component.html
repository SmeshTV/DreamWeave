<nav class="navbar">
  <div class="nav-container">
    <a routerLink="/" class="nav-logo">KBTU Underground</a>
    <button class="menu-toggle" (click)="toggleMenu()" aria-label="Toggle menu">
      <span class="bar"></span>
      <span class="bar"></span>
      <span class="bar"></span>
    </button>
    <div class="nav-links" [class.active]="menuOpen">
      <a routerLink="/" routerLinkActive="active" [routerLinkActiveOptions]="{exact: true}" (click)="closeMenu()">Home</a>
      <a routerLink="/events" routerLinkActive="active" (click)="closeMenu()">Events</a>
      @if (loggedIn) {
        <a routerLink="/create-event" routerLinkActive="active" (click)="closeMenu()">Create Event</a>
        <a routerLink="/profile" routerLinkActive="active" (click)="closeMenu()">Profile</a>
        <span class="nav-username">{{ username }}</span>
        <button class="btn-logout" (click)="onLogout()">Logout</button>
      } @else {
        <a routerLink="/login" routerLinkActive="active" class="btn-login" (click)="closeMenu()">Login</a>
      }
    </div>
  </div>
</nav>
